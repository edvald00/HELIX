<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel 3D · Hélix — Digital Twin AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .dashboard-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
    }
    .dashboard-main {
      flex: 1;
      padding: 40px 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    @media (max-width: 600px) {
      .dashboard-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .canvas-container { min-height: 400px; }
    }
    .canvas-container {
      flex: 1;
      min-height: 600px;
      border: 1px dashed rgba(0, 174, 239, 0.4);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(15,23,42,.4), rgba(2,6,23,.6));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
    }
    .canvas-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 174, 239, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .canvas-msg {
      text-align: center;
      z-index: 2;
      animation: floaty 3s ease-in-out infinite;
    }
    .canvas-msg svg {
      width: 56px;
      height: 56px;
      color: var(--brand);
      margin-bottom: 16px;
      filter: drop-shadow(0 0 12px rgba(0, 174, 239, 0.5));
    }
  </style>
</head>

<body class="dashboard-layout">
  <div class="noise-overlay"></div>
  
  <header class="header">
    <nav class="nav" style="max-width: 1400px;">
      <a href="index.html" class="brand">
        <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="40" x2="40">
              <stop offset="0%" stop-color="#00AEEF" />
              <stop offset="100%" stop-color="#7C3AED" />
            </linearGradient>
          </defs>
          <g class="helix-loop" stroke="url(#lg)" stroke-width="2.6" stroke-linecap="round" fill="none">
            <path d="M20 4 C 30 12, 30 18, 20 20 C 10 22, 10 28, 20 36" />
            <path d="M20 4 C 10 12, 10 18, 20 20 C 30 22, 30 28, 20 36" />
          </g>
          <circle cx="20" cy="20" r="2" fill="#00AEEF" />
        </svg><span><b>Hé</b>lix</span>
      </a>
      
      <div class="actions">
        <span class="muted" style="font-size: 14px; margin-right: 16px;" id="userEmailDisplay">Autenticando...</span>
        <a href="#" class="btn btn-ghost" id="btnLogout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg> Sair
        </a>
      </div>
    </nav>
  </header>

  <main class="dashboard-main">
    <div class="dashboard-header reveal in">
      <div>
        <span class="eyebrow">AMBIENTE SEGURO</span>
        <h1 style="font-size: 32px; margin-top: 12px;">Visualizador 3D</h1>
      </div>
      <div>
        <button class="btn btn-primary btn-shimmer">Sincronizar Gêmeo Digital</button>
      </div>
    </div>
    
    <div class="canvas-container reveal delay-2 in">
      <div class="canvas-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <h3>Área do Modelo 3D</h3>
        <p class="muted" style="margin-top:8px">O seu código Spline ou Three.js será renderizado aqui dentro.</p>
      </div>
    </div>
  </main>
  
  <script src="script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnh0xrXL4DsMNx1PuS8xzqcxsy_cnnrWM",
      authDomain: "helix-3da17.firebaseapp.com",
      projectId: "helix-3da17",
      storageBucket: "helix-3da17.firebasestorage.app",
      messagingSenderId: "1001757455710",
      appId: "1:1001757455710:web:f8c64062bd4ac61075cbcf",
      measurementId: "G-S37SK0EH2F"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        const el = document.getElementById('userEmailDisplay');
        if (el) el.textContent = user.email;
      }
    });

    document.getElementById('btnLogout')?.addEventListener('click', (e) => {
      e.preventDefault();
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
